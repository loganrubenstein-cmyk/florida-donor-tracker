# Hand-curated vendor clusters for cases the automated clusterer can't catch.
# Loaded by 46b_build_vendor_entities.py as source='manual_merge'.
#
# Format:
#   - canonical_name: "Human-readable canonical name"
#     canonical_slug: unique-slug-no-spaces      (defaults to slugified name)
#     is_government: true|false                  (default false)
#     aliases:
#       - "ALIAS 1"
#       - "ALIAS 2"
#
# Aliases are normalized by _vendor_norm.normalize() before insert.
# Each alias that's already in vendor_aliases with a different canonical_slug
# gets REASSIGNED (logged in vendor_merge_log).

clusters:
  - canonical_name: "USPS"
    canonical_slug: usps
    is_government: true
    aliases:
      - USPS
      - UNITED STATES POSTAL SERVICE
      - U.S. POSTAL SERVICE
      - US POSTAL SERVICE
      - POSTMASTER
      - US POSTMASTER
      - U.S. POSTMASTER
      - USPS.COM

