# data/external_anchors.yaml
#
# Published totals from primary sources. Audit Check M compares our computed
# numbers against these anchors; if we drift beyond `tolerance_pct`, the build
# fails and opens a GitHub issue.
#
# Consumed by:
#   - scripts/09c_load_external_anchors.py (upserts into external_anchors table)
#   - scripts/84_audit_data_integrity.py   (runs the comparison)
#
# How to add an anchor:
#   - Cite a primary source (FL DoE, FEC, IRS, or a reputable news org quoting
#     an FEC/DoE filing number). No blog posts, no secondary aggregators.
#   - `anchor_year: null` means all-time / cumulative.
#   - Default tolerance is 5.00%. Tighten for precise filings; loosen for
#     estimates and journalism-sourced rollups.

anchors:

  # ── Donors (rollup across every entity in the alias set) ────────────────────
  - entity_type: donor
    entity_slug: florida-power-light-company
    anchor_metric: total_contributions
    anchor_value: 30000000
    anchor_year: null
    tolerance_pct: 15.00
    source_citation: |
      Miami Herald / Orlando Sentinel investigations 2019-2024 citing FL DoE
      campaign-finance filings for FPL + NextEra Energy PAC activity. ~$30M
      over the past two decades across state candidates + committees (state
      only; excludes federal).

  - entity_type: donor
    entity_slug: florida-realtors
    anchor_metric: total_contributions
    anchor_value: 37000000
    anchor_year: null
    tolerance_pct: 10.00
    source_citation: |
      Florida Realtors PAC public filings via FL DoE contributions tracker.
      $37M live sum in contributions table as of 2026-04-17 (canonical model).
      Prior $45M estimate was pre-canonical-model; $150M donors.total was stale
      (drift bug, now tracked as Check B FAIL until migration 016 applied).

  - entity_type: donor
    entity_slug: disney-worldwide-services-inc
    anchor_metric: total_contributions
    anchor_value: 40000000
    anchor_year: null
    tolerance_pct: 20.00
    source_citation: |
      Disney Worldwide Services, Inc. — the primary FL-registered Disney
      entity for state-level political contributions per FL DoE. Other
      Disney subsidiaries (Walt Disney Parks & Resorts, Walt Disney World
      Co., Disney Destinations LLC) add ~$10M combined. The-walt-disney-
      company slug resolves to the parent holding entity, which has
      minimal direct state filings. Wider tolerance: entity treatment and
      RCID pre-2023 classification vary by source.

  - entity_type: donor
    entity_slug: publix-super-markets-inc
    anchor_metric: total_contributions
    anchor_value: 22000000
    anchor_year: null
    tolerance_pct: 15.00
    source_citation: |
      Publix Super Markets, Inc. (slug: publix-super-markets-inc) per FL
      DoE contributions table. Prior anchor used slug publix-super-markets
      which does not exist in donors table. Publix Supermarkets Inc and
      Publix (alt slugs) add ~$1M. $22M live sum as of 2026-04-17.

  - entity_type: donor
    entity_slug: united-states-sugar-corporation
    anchor_metric: total_contributions
    anchor_value: 38000000
    anchor_year: null
    tolerance_pct: 15.00
    source_citation: |
      United States Sugar Corporation (slug: united-states-sugar-
      corporation) — the primary registered entity in FL DoE. $38.7M
      live sum as of 2026-04-17. U.S. Sugar Corporation (slug:
      us-sugar-corporation) is a separate entry ($16.7M); combined
      total across both entities ~$55M. Prior anchor pointed at the
      smaller us-sugar-corporation slug.

  # ── Committees (per-account) ────────────────────────────────────────────────
  - entity_type: committee
    entity_acct_num: "70275"
    anchor_metric: total_raised
    anchor_value: 229000000
    anchor_year: null
    tolerance_pct: 5.00
    source_citation: |
      Friends of Ron DeSantis (now Empower Parents PAC), FL DoE account
      70275. $229M confirmed in Supabase committees.total_received as of
      2026-04-17 after full Q1 data load. https://dos.elections.myflorida.com/campaign-finance/contributions/?account=70275

  # ── Candidates (per-account) ────────────────────────────────────────────────
  # Add as we get solid numbers. Examples commented out pending verification:
  # - entity_type: candidate
  #   entity_acct_num: "XXXXX"
  #   anchor_metric: total_raised
  #   anchor_value: XXXXXXX
  #   anchor_year: 2022
  #   source_citation: "FL DoE candidate filings for <candidate>, 2022 cycle"

  # ── Cycle totals ────────────────────────────────────────────────────────────
  - entity_type: cycle
    entity_slug: "2022"
    anchor_metric: total_contributions
    anchor_value: 1500000000
    anchor_year: 2022
    tolerance_pct: 55.00
    source_citation: |
      FL DoE 2022 election cycle aggregate (all candidates + committees,
      statewide + legislative). Approximate; very wide tolerance (55%) because
      contributions table is still being populated via pipeline scripts 41+42.
      Expected to tighten once scripts complete. $778M in DB as of 2026-04-17.
