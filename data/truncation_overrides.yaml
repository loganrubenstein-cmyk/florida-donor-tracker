# FL DoE ingests contributor_name at 30-char max. This file records the
# canonical full names for entities that were truncated at ingestion, plus a
# whitelist of names that happen to be exactly 30 chars but are NOT truncated.
#
# Consumed by:
#   - scripts/patch_truncation_overrides.py  (applies fixes to donor_entities)
#   - scripts/84_audit_data_integrity.py     (check_d_truncation whitelist)
#
# Adding a new entry:
#   1. Add under `fixes:` with slug + truncated + full name
#   2. Run scripts/patch_truncation_overrides.py --apply
#   3. Re-run 84 audit — the slug will no longer appear under D

