name: Quarterly — Full Pipeline Refresh

on:
  schedule:
    - cron: '0 17 11 1,4,7,10 *'
  workflow_dispatch:

concurrency:
  group: quarterly-full-refresh
  cancel-in-progress: false

env:
  SUPABASE_DB_URL:               ${{ secrets.SUPABASE_DB_URL }}
  SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
  SITE_URL:                      ${{ secrets.SITE_URL }}

jobs:
  full-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 480
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: "01 committees directory"
        uses: ./.github/actions/run-script
        with: { script: 01_import_finance.py }

      - name: "02 registry + closed discovery"
        uses: ./.github/actions/run-script
        with: { script: 02_download_registry.py }

      - name: "03 contributions scrape"
        uses: ./.github/actions/run-script
        with: { script: 03_scrape_contributions.py }

      - name: "20 scrape candidate contributions"
        uses: ./.github/actions/run-script
        with: { script: 20_scrape_candidate_contributions.py }

      - name: "21 import candidate contributions"
        uses: ./.github/actions/run-script
        with: { script: 21_import_candidate_contributions.py }

      - name: "09 canonical donor dedup"
        uses: ./.github/actions/run-script
        with: { script: 09_deduplicate_donors.py }

      - name: "09b manual merges"
        uses: ./.github/actions/run-script
        with: { script: 09b_apply_manual_merges.py }

      # "10 donor enrichment" — skipped post-donors_mv cutover; enrichment is
      # now derived from donor_entities + contributions via the materialized
      # view. If re-enabling, target 97b_enrich_donors_from_corps.py but note
      # it writes to the donors view (rewrite required for MV path).

      - name: "25 export donor profiles"
        uses: ./.github/actions/run-script
        with: { script: 25_export_donor_profiles.py }

      # Principal matcher pipeline. 14 + 15 regenerate principals.csv from
      # Online Sunshine (fresh on each run, since data/processed/ is gitignored
      # and CI runners are ephemeral).
      - name: "14 download lobbyist registration files"
        uses: ./.github/actions/run-script
        with: { script: 14_download_lobbyists.py, args: "--force" }

      - name: "15 import lobbyist registrations (→ principals.csv)"
        uses: ./.github/actions/run-script
        with: { script: 15_import_lobbyists.py, args: "--force" }

      - name: "16 match principals to contributors"
        uses: ./.github/actions/run-script
        with: { script: 16_match_principals.py, args: "--force" }

      - name: "26 export lobbyist profiles"
        uses: ./.github/actions/run-script
        with: { script: 26_export_lobbyist_profiles.py, args: "--force" }

      - name: "40 load committees"
        uses: ./.github/actions/run-script
        with: { script: 40_load_supabase.py }

      - name: "41 load contributions"
        uses: ./.github/actions/run-script
        with: { script: 41_load_contributions.py }

      - name: "42 load candidate contributions"
        uses: ./.github/actions/run-script
        with: { script: 42_load_candidate_contributions.py }

      - name: "78 build linkage edges"
        uses: ./.github/actions/run-script
        with: { script: 78_build_linkage_edges.py }

      - name: "80 load linkage edges"
        uses: ./.github/actions/run-script
        with: { script: 80_load_linkage_edges_supabase.py }

      - name: "85 reconcile donors"
        uses: ./.github/actions/run-script
        with: { script: 85_reconcile_donor_aggregates.py }

      - name: "85b reconcile committees"
        uses: ./.github/actions/run-script
        with: { script: 85b_reconcile_committees.py }

      # Reload pdm from the JSONs produced by step 26. Truncate+insert; fast.
      - name: "40c reload principal_donation_matches"
        uses: ./.github/actions/run-script
        with: { script: 40c_reload_principal_matches.py }

      - name: "84 integrity audit"
        uses: ./.github/actions/run-script
        with: { script: 84_audit_data_integrity.py }

      - name: "99 smoke test"
        uses: ./.github/actions/run-script
        with: { script: 99_smoke_test.py }

      - name: Open issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          title: "[pipeline-failure:high] quarterly-full-refresh"
          labels: pipeline-failure,severity:high,data-update
          primary-log: data/logs/84_audit_data_integrity.py.log
