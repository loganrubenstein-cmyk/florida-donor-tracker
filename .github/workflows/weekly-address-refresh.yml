name: Weekly — Entity Address Refresh

# Refreshes donor_addresses + principal_addresses from contributions and
# fl_corporations. Both scripts read directly from Supabase, so this workflow
# is independent of the CSV-based principal matcher pipeline (scripts 15-17,
# 26, 40c) which has no scheduled runner yet.
#
# Cadence: Sundays 10:00 UTC. Roughly synchronized with the weekly-legislature
# refresh so tagged content across the site moves forward together.

on:
  schedule:
    - cron: '0 10 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-address-refresh
  cancel-in-progress: false

env:
  SUPABASE_DB_URL:               ${{ secrets.SUPABASE_DB_URL }}
  SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: "108 build entity addresses (donor + principal-exact)"
        uses: ./.github/actions/run-script
        with:
          script: 108_build_entity_addresses.py

      - name: "109 expand principal_addresses via fl_corp normalized match"
        uses: ./.github/actions/run-script
        with:
          script: 109_fuzzy_match_principals_fl_corp.py

      - name: Open issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          title: "[pipeline-failure:medium] weekly-address-refresh"
          labels: pipeline-failure,severity:medium,data-update
          primary-log: data/logs/108_build_entity_addresses.py.log
