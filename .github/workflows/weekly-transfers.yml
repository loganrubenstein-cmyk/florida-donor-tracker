name: Weekly — Fund Transfers

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-transfers
  cancel-in-progress: false

env:
  SUPABASE_DB_URL:               ${{ secrets.SUPABASE_DB_URL }}
  SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  transfers:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Scrape fund transfers
        uses: ./.github/actions/run-script
        with:
          script: 11_scrape_transfers.py
      - name: Open issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[pipeline-failure:low] weekly-transfers"
          content-filepath: data/logs/11_scrape_transfers.py.log
          labels: pipeline-failure,severity:low,data-update
