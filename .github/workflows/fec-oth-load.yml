name: FEC Oth — Load FL Committee Transfers

on:
  workflow_dispatch:

concurrency:
  group: fec-oth-load
  cancel-in-progress: false

env:
  SUPABASE_DB_URL:               ${{ secrets.SUPABASE_DB_URL }}
  SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  load:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          df -h /

      - name: Load FEC oth (FL-related, streaming)
        uses: ./.github/actions/run-script
        with:
          script: 106_load_fec_oth_fl.py
          args: --cycles 2016,2018,2020,2022,2024,2026 --stream

      - name: Open issue on failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          title: "[pipeline-failure:medium] fec-oth-load"
          labels: pipeline-failure,severity:medium,data-update
          primary-log: data/logs/106_load_fec_oth_fl.py.log
