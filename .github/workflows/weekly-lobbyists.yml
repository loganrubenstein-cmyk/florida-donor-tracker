name: Weekly — Lobbyists + Compensation

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

concurrency:
  group: weekly-lobbyists
  cancel-in-progress: false

env:
  SUPABASE_DB_URL:               ${{ secrets.SUPABASE_DB_URL }}
  SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

jobs:
  lobbyists:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Scrape lobbyist directory
        uses: ./.github/actions/run-script
        with:
          script: 14_scrape_lobbyists.py
      - name: Scrape + load compensation
        uses: ./.github/actions/run-script
        with:
          script: 47_load_lobbyist_compensation.py
      - name: Open issue on failure
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "[pipeline-failure:medium] weekly-lobbyists"
          content-filepath: data/logs/14_scrape_lobbyists.py.log
          labels: pipeline-failure,severity:medium,data-update
